<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/layout_admin :: layout(~{::title},~{::link},~{::style},~{::script},~{::section})}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>공지사항 관리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f9fafb; color: #1f2937; }

    .dash { padding: 24px; width: 100%; box-sizing: border-box; }
    .content-container { background: white; border-radius: 8px; border: 1px solid #e5e7eb; padding: 24px; }
    .page-title { font-size: 18px; font-weight: 600; color: #1f2937; margin-bottom: 24px; }

    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 8px; padding: 20px; text-align: center; }
    .stat-card .label { font-size: 14px; color: #6b7280; margin-bottom: 8px; }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #1f2937; }

    .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .search-box input { width: 300px; padding: 10px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; background: #f9fafb; }
    .search-box input:focus { outline: none; border-color: #d1d5db; background: white; }

    .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; background: #06b6d4; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-primary:hover { background: #0891b2; }

    .notice-table { width: 100%; border-collapse: collapse; }
    .notice-table thead tr { border-bottom: 1px solid #e5e7eb; }
    .notice-table th { padding: 12px 8px; text-align: left; font-weight: 500; color: #6b7280; font-size: 13px; }
    .notice-table th.center { text-align: center; }
    .notice-table td { padding: 16px 8px; font-size: 14px; color: #374151; border-bottom: 1px solid #f3f4f6; }
    .notice-table td.center { text-align: center; }
    .notice-table tbody tr:hover { background: #f9fafb; }
    .notice-table tbody tr.important { background: rgba(254,242,242,0.5); border-left: 3px solid #ef4444; }
    .notice-table tbody tr.important:hover { background: rgba(254,226,226,0.5); }

    .badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .badge.important { background: #ef4444; color: white; }
    .badge.normal { background: #9ca3af; color: white; }
    .badge.active { background: #10b981; color: white; }
    .badge.inactive { background: #9ca3af; color: white; }
    .type-badge { cursor: pointer; transition: all 0.2s; }
    .type-badge:hover { opacity: 0.8; transform: scale(1.05); }

    .action-buttons { display: flex; gap: 4px; justify-content: flex-end; }
    .btn-action { padding: 6px 10px; border: none; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-popup { background: #e5e7eb; color: #4b5563; width: 52px; height: 28px; text-align: center; }
    .btn-popup:hover { background: #d1d5db; }
    .btn-popup.popup-active { background: #f59e0b; color: white; }
    .btn-popup.popup-active:hover { background: #d97706; }
    .btn-edit { background: #06b6d4; color: white; }
    .btn-edit:hover { background: #0891b2; }
    .btn-delete { background: #ef4444; color: white; }
    .btn-delete:hover { background: #dc2626; }

    .table-footer { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 16px 0; margin-top: 8px; }
    .total-count { font-size: 14px; color: #6b7280; }
    .pagination { display: flex; gap: 4px; }
    .pagination a { display: inline-block; padding: 8px 14px; border: 1px solid #e5e7eb; background: white; border-radius: 6px; font-size: 13px; color: #374151; text-decoration: none; transition: all 0.15s; }
    .pagination a:hover { background: #f9fafb; }
    .pagination a.active { background: #06b6d4; color: white; border-color: #06b6d4; }
    .pagination a.disabled { color: #d1d5db; background: #f9fafb; cursor: not-allowed; pointer-events: none; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 24px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-content h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; color: #374151; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #06b6d4; }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .form-group small { display: block; margin-top: 4px; font-size: 12px; color: #9ca3af; }

    .radio-group { display: flex; gap: 16px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 400; margin: 0; }
    .radio-group input[type="radio"] { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 400; }
    .checkbox-label input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    .popup-date-area { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-top: 8px; }

    .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 24px; }
    .btn-cancel { padding: 10px 20px; background: #f3f4f6; border: none; border-radius: 6px; font-size: 14px; color: #374151; cursor: pointer; font-family: inherit; }
    .btn-cancel:hover { background: #e5e7eb; }

    .confirm-modal-content { max-width: 400px; }
    .confirm-modal-content p { font-size: 14px; color: #374151; line-height: 1.6; margin-bottom: 8px; }
    .confirm-modal-content .notice-name { font-weight: 600; color: #1f2937; }
    .confirm-modal-content .warn-text { font-size: 13px; color: #ef4444; margin-top: 4px; }
    .btn-confirm { padding: 10px 20px; background: #f59e0b; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-confirm:hover { background: #d97706; }

    .popup-preview-content { max-width: 500px; }
    .popup-preview-box { border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .popup-header { padding: 16px 20px; border-bottom: 1px solid #f3f4f6; }
    .popup-title { display: block; font-size: 16px; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
    .popup-period { font-size: 13px; color: #6b7280; }
    .popup-body { padding: 16px 20px; }
    .popup-content-text { font-size: 14px; color: #374151; line-height: 1.6; white-space: pre-wrap; }
    .popup-close-btn { padding: 8px 20px; background: #1f2937; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .popup-close-btn:hover { background: #374151; }
    .btn-deactivate { padding: 10px 20px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
    .btn-deactivate:hover { background: #dc2626; }

    .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: #10b981; }
    .toast.warning { background: #f59e0b; }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', function () {

      var today = new Date().toISOString().split('T')[0];
      document.getElementById('noticeEndDate').min  = today;
      document.getElementById('popupStartDate').min = today;
      document.getElementById('popupEndDate').min   = today;

      var editingId       = null;
      var previewTargetId = null;
      var pendingPopupId  = null;

      /* ── 검색 (서버사이드) ── */
      window.applyFilters = function () {
        var search = document.getElementById('searchInput').value.trim();
        var params = new URLSearchParams();
        if (search) params.set('search', search);
        params.set('page', '1');
        window.location.href = '/user-service/admin/notices?' + params.toString();
      };
      document.getElementById('searchInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') applyFilters();
      });

      /* ── 등록 모달 ── */
      window.openModal = function () {
        editingId = null;
        document.getElementById('modalTitle').textContent = '공지사항 등록';
        document.getElementById('noticeTitle').value   = '';
        document.getElementById('noticeContent').value = '';
        document.getElementById('noticeStatus').value  = '1';
        document.querySelector('input[name="noticeType"][value="N"]').checked = true;
        document.getElementById('noticeEndDate').value  = '';
        document.getElementById('popupYnCheck').checked = false;
        document.getElementById('popupDateArea').style.display = 'none';
        document.getElementById('popupStartDate').value = '';
        document.getElementById('popupEndDate').value   = '';
        document.getElementById('noticeModal').classList.add('active');
      };

      /* ── 수정 모달 ── */
      window.editNotice = function (id) {
        fetch('/user-service/admin/notices/' + id + '/detail')
          .then(function (res) { return res.json(); })
          .then(function (data) {
            editingId = id;
            document.getElementById('modalTitle').textContent  = '공지사항 수정';
            document.getElementById('noticeTitle').value       = data.title;
            document.getElementById('noticeContent').value     = data.content;
            document.getElementById('noticeStatus').value      = String(data.status);
            document.querySelector('input[name="noticeType"][value="' + data.pinnedYn + '"]').checked = true;
            document.getElementById('noticeEndDate').value     = data.endDate     ? data.endDate.substring(0, 10)     : '';
            var isPopup = data.popupYn === 'Y';
            document.getElementById('popupYnCheck').checked = isPopup;
            document.getElementById('popupDateArea').style.display = isPopup ? 'block' : 'none';
            document.getElementById('popupStartDate').value = data.popupStartAt ? data.popupStartAt.substring(0, 10) : '';
            document.getElementById('popupEndDate').value   = data.popupEndAt   ? data.popupEndAt.substring(0, 10)   : '';
            document.getElementById('noticeModal').classList.add('active');
          })
          .catch(function () { showToast('데이터를 불러오는 데 실패했습니다.', 'warning'); });
      };

      /* ── 팝업 체크박스 토글 ── */
      document.getElementById('popupYnCheck').addEventListener('change', function () {
        document.getElementById('popupDateArea').style.display = this.checked ? 'block' : 'none';
      });

      /* ── 팝업 종료일 min 동기화 ── */
      document.getElementById('popupStartDate').addEventListener('change', function () {
        var endEl = document.getElementById('popupEndDate');
        endEl.min = this.value;
        if (endEl.value && endEl.value < this.value) endEl.value = '';
      });

      /* ── 저장 ── */
      window.saveNotice = function () {
        var title      = document.getElementById('noticeTitle').value.trim();
        var content    = document.getElementById('noticeContent').value.trim();
        var status     = 1;
        var pinnedYn   = document.querySelector('input[name="noticeType"]:checked').value;
        var endDate    = document.getElementById('noticeEndDate').value;
        var popupYn    = document.getElementById('popupYnCheck').checked ? 'Y' : 'N';
        var popupStart = document.getElementById('popupStartDate').value;
        var popupEnd   = document.getElementById('popupEndDate').value;

        if (!title)   { alert('제목을 입력해주세요.');  return; }
        if (!content) { alert('내용을 입력해주세요.');  return; }

        if (endDate && endDate < today) {
          alert('마감일은 오늘 이후 날짜로 설정해주세요.');
          return;
        }
        if (popupYn === 'Y') {
          if (!popupStart) { alert('팝업 시작일을 입력해주세요.'); return; }
          if (popupStart < today) { alert('팝업 시작일은 오늘 이후로 설정해주세요.'); return; }
          if (popupEnd) {
            if (popupEnd < today)      { alert('팝업 종료일은 오늘 이후로 설정해주세요.');   return; }
            if (popupEnd < popupStart) { alert('팝업 종료일은 시작일 이후로 설정해주세요.'); return; }
          }
          if (endDate && popupEnd && popupEnd > endDate) {
            alert('팝업 종료일은 공지 마감일(' + endDate + ')을 초과할 수 없습니다.');
            return;
          }
        }

        var body   = { title: title, content: content, status: status, pinnedYn: pinnedYn,
                       endDate: endDate, popupYn: popupYn, popupStartAt: popupStart, popupEndAt: popupEnd };
        var url    = editingId ? '/user-service/admin/notices/' + editingId : '/user-service/admin/notices';
        var method = editingId ? 'PUT' : 'POST';

        fetch(url, {
          method: method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        }).then(function (res) {
          if (res.ok) {
            closeModal();
            showToast(editingId ? '수정됐습니다.' : '등록됐습니다.', 'success');
            setTimeout(function () { location.href = location.pathname + location.search; }, 1000);
          } else {
            showToast('처리 중 오류가 발생했습니다.', 'warning');
          }
        });
      };

      /* ── 삭제 ── */
      window.deleteNotice = function (id, title) {
        if (!confirm('정말 삭제하시겠습니까?\n\n제목: ' + title)) return;
        fetch('/user-service/admin/notices/' + id, { method: 'DELETE' })
          .then(function (res) {
            if (res.ok) {
              showToast('삭제됐습니다.', 'warning');
              setTimeout(function () { location.href = location.pathname + location.search; }, 1000);
            } else {
              showToast('처리 중 오류가 발생했습니다.', 'warning');
            }
          });
      };

      /* ── 중요/일반 토글 ── */
      window.toggleType = function (id) {
        fetch('/user-service/admin/notices/' + id + '/type', { method: 'PATCH' })
          .then(function (res) {
            if (res.ok) location.href = location.pathname + location.search;
            else showToast('처리 중 오류가 발생했습니다.', 'warning');
          });
      };

      /* ── 팝업 버튼 클릭 → 미리보기 모달 ── */
      window.handlePopupBtn = function (id, popupYn) {
        previewTargetId = id;
        fetch('/user-service/admin/notices/' + id + '/detail')
          .then(function (res) { return res.json(); })
          .then(function (data) {
            document.getElementById('popupPreviewTitle').textContent   = data.title;
            document.getElementById('popupPreviewContent').textContent = data.content;
            document.getElementById('popupPeriod').textContent =
              data.popupStartAt
                ? ('팝업 기간: ' + data.popupStartAt.substring(0, 10)
                    + (data.popupEndAt ? ' ~ ' + data.popupEndAt.substring(0, 10) : ''))
                : '';
            var activateBtn   = document.getElementById('popupActivateBtn');
            var deactivateBtn = document.getElementById('popupDeactivateBtn');
            if (popupYn === 'Y') {
              activateBtn.style.display   = 'none';
              deactivateBtn.style.display = 'inline-block';
            } else {
              activateBtn.style.display   = 'inline-block';
              deactivateBtn.style.display = 'none';
            }
            document.getElementById('popupPreviewModal').classList.add('active');
          });
      };

      /* ── 팝업 활성화 (1개만 허용) ── */
      window.activatePopupFromPreview = function () {
        var activeBtn = document.querySelector('.btn-popup.popup-active');
        if (activeBtn && activeBtn.dataset.id != previewTargetId) {
          alert('이미 팝업으로 지정된 공지가 있습니다.\n\n현재 팝업: ' + activeBtn.dataset.title + '\n\n기존 팝업을 먼저 해제한 뒤 다시 시도해주세요.');
          closePopupPreview();
          return;
        }
        doActivatePopup(previewTargetId);
        closePopupPreview();
      };

      /* ── 팝업 해제 ── */
      window.deactivatePopupFromPreview = function () {
        fetch('/user-service/admin/notices/' + previewTargetId + '/popup', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'deactivate' })
        }).then(function (res) {
          if (res.ok) {
            showToast('팝업이 해제됐습니다.', 'warning');
            closePopupPreview();
            setTimeout(function () { location.href = location.pathname + location.search; }, 1000);
          } else {
            showToast('처리 중 오류가 발생했습니다.', 'warning');
          }
        });
      };

      function doActivatePopup(id) {
        fetch('/user-service/admin/notices/' + id + '/popup', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'activate' })
        }).then(function (res) {
          if (res.ok) {
            showToast('팝업이 활성화됐습니다.', 'success');
            setTimeout(function () { location.href = location.pathname + location.search; }, 1000);
          } else {
            showToast('처리 중 오류가 발생했습니다.', 'warning');
          }
        });
      }

      /* ── 팝업 교체 확인 ── */
      window.confirmReplace = function () {
        doActivatePopup(pendingPopupId);
        pendingPopupId = null;
        closeReplaceModal();
      };

      /* ── 모달 닫기 ── */
      window.closeModal        = function () { document.getElementById('noticeModal').classList.remove('active');       editingId = null; };
      window.closePopupPreview = function () { document.getElementById('popupPreviewModal').classList.remove('active'); previewTargetId = null; };
      window.closeReplaceModal = function () { document.getElementById('popupReplaceModal').classList.remove('active'); pendingPopupId = null; };

      document.querySelectorAll('.modal').forEach(function (modal) {
        modal.addEventListener('click', function (e) { if (e.target === modal) modal.classList.remove('active'); });
      });

    }); // DOMContentLoaded 끝

    /* ── 토스트 (전역 — DOM에 없어도 동적 생성) ── */
    function showToast(msg, type) {
      var toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.style.cssText = 'position:fixed;bottom:24px;right:24px;padding:14px 20px;border-radius:8px;font-size:14px;font-weight:500;color:white;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s ease;pointer-events:none;';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      toast.style.background = (type === 'success') ? '#10b981' : '#f59e0b';
      if (toast._hideTimer) clearTimeout(toast._hideTimer);
      setTimeout(function () {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';
      }, 10);
      toast._hideTimer = setTimeout(function () {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(10px)';
      }, 3000);
    }
  </script>
</head>

<body>
<section class="dash">
  <div class="content-container">
    <h1 class="page-title">공지사항 관리</h1>

    <!-- 통계 카드 -->
    <div class="stats-grid">
      <div class="stat-card"><div class="label">전체 공지사항</div><div class="value" th:text="${totalCount}">0</div></div>
      <div class="stat-card"><div class="label">중요 공지</div><div class="value" th:text="${importantCount}">0</div></div>
      <div class="stat-card"><div class="label">게시중</div><div class="value" th:text="${activeCount}">0</div></div>
      <div class="stat-card"><div class="label">팝업 공지</div><div class="value" th:text="${popupCount}">0</div></div>
    </div>

    <!-- 검색 + 등록 -->
    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="제목 또는 내용으로 검색..."
               th:value="${param.search != null ? param.search[0] : ''}">
      </div>
      <button class="btn-primary" onclick="openModal()">+ 공지사항 등록</button>
    </div>

    <!-- 테이블 -->
    <table class="notice-table">
      <thead>
        <tr>
          <th class="center" style="width:50px;">번호</th>
          <th class="center" style="width:70px;">구분</th>
          <th>제목</th>
          <th class="center" style="width:100px;">작성일</th>
          <th class="center" style="width:100px;">마감일</th>
          <th class="center" style="width:110px;">팝업 시작일</th>
          <th class="center" style="width:110px;">팝업 종료일</th>
          <th class="center" style="width:80px;">조회수</th>
          <th class="center" style="width:70px;">상태</th>
          <th class="center" style="width:180px;">관리</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="notice, stat : ${notices}"
            th:classappend="${notice.pinnedYn == 'Y'} ? 'important'">

          <td class="center" th:text="${(currentPage - 1) * 10 + stat.count}"></td>

          <td class="center">
            <span class="badge type-badge"
                  th:classappend="${notice.pinnedYn == 'Y'} ? 'important' : 'normal'"
                  th:text="${notice.pinnedYn == 'Y'} ? '중요' : '일반'"
                  th:attr="onclick='toggleType(' + ${notice.noticeId} + ')'">
            </span>
          </td>

          <td th:text="${notice.title}"></td>

          <td class="center" th:text="${#dates.format(notice.createdAt, 'yyyy-MM-dd')}"></td>

          <td class="center"
              th:text="${notice.endDate != null} ? ${#dates.format(notice.endDate, 'yyyy-MM-dd')} : '상시'">
          </td>

          <td class="center"
              th:text="${notice.popupStartAt != null} ? ${#dates.format(notice.popupStartAt, 'yyyy-MM-dd')} : '-'">
          </td>

          <td class="center"
              th:text="${notice.popupEndAt != null} ? ${#dates.format(notice.popupEndAt, 'yyyy-MM-dd')} : '-'">
          </td>

          <td class="center" th:text="${#numbers.formatInteger(notice.viewCount, 0, 'COMMA')}"></td>

          <td class="center">
            <span class="badge"
                  th:classappend="${notice.status == 1} ? 'active' : 'inactive'"
                  th:text="${notice.status == 1} ? '게시중' : '마감'">
            </span>
          </td>

          <td class="center">
            <div class="action-buttons">
              <th:block th:if="${notice.status == 1}">
                <button type="button" class="btn-action btn-popup"
                        th:classappend="${notice.popupYn == 'Y'} ? 'popup-active'"
                        th:attr="data-id=${notice.noticeId},
                                 data-title=${notice.title},
                                 onclick='handlePopupBtn(' + ${notice.noticeId} + ', \'' + ${notice.popupYn} + '\')'">
                  <span th:text="${notice.popupYn == 'Y'} ? '팝업 ON' : '팝업'"></span>
                </button>
              </th:block>
              <button type="button" class="btn-action btn-edit"
                      th:attr="onclick='editNotice(' + ${notice.noticeId} + ')'">수정</button>
              <button type="button" class="btn-action btn-delete"
                      th:attr="data-id=${notice.noticeId}, data-title=${notice.title}"
                      onclick="deleteNotice(this.dataset.id, this.dataset.title)">삭제</button>
            </div>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(notices)}">
          <td colspan="10" style="text-align:center; padding:40px; color:#9ca3af;">
            공지사항이 없습니다.
          </td>
        </tr>
      </tbody>
    </table>

    <!-- 페이지바 -->
    <div class="table-footer">
      <span class="total-count">총 <span th:text="${totalCount}"></span>개의 공지사항</span>
      <div class="pagination">
        <a th:href="@{/admin/notices(page=1,search=${param.search})}"
           th:classappend="${currentPage == 1} ? 'disabled'">«</a>
        <a th:href="@{/admin/notices(page=${currentPage > 1 ? currentPage-1 : 1},search=${param.search})}"
           th:classappend="${currentPage == 1} ? 'disabled'">이전</a>
        <span th:each="i : ${#numbers.sequence(1, totalPages)}">
          <a th:href="@{/admin/notices(page=${i},search=${param.search})}"
             th:text="${i}"
             th:classappend="${i == currentPage} ? 'active'"></a>
        </span>
        <a th:href="@{/admin/notices(page=${currentPage < totalPages ? currentPage+1 : totalPages},search=${param.search})}"
           th:classappend="${currentPage == totalPages} ? 'disabled'">다음</a>
        <a th:href="@{/admin/notices(page=${totalPages},search=${param.search})}"
           th:classappend="${currentPage == totalPages} ? 'disabled'">»</a>
      </div>
    </div>
  </div>

  <!-- 등록/수정 모달 -->
  <div class="modal" id="noticeModal">
    <div class="modal-content">
      <h2 id="modalTitle">공지사항 등록</h2>
      <div class="form-group">
        <label>구분 *</label>
        <div class="radio-group">
          <label><input type="radio" name="noticeType" value="N" checked> 일반</label>
          <label><input type="radio" name="noticeType" value="Y"> 중요</label>
        </div>
      </div>
      <div class="form-group">
        <label>상태 *</label>
        <select id="noticeStatus">
          <option value="1">게시중</option>
        </select>
      </div>
      <div class="form-group">
        <label>제목 *</label>
        <input type="text" id="noticeTitle" placeholder="공지사항 제목을 입력하세요">
      </div>
      <div class="form-group">
        <label>내용 *</label>
        <textarea id="noticeContent" placeholder="공지사항 내용을 입력하세요"></textarea>
      </div>
      <div class="form-group">
        <label>마감일 <span style="color:#9ca3af; font-weight:400;">(선택)</span></label>
        <input type="date" id="noticeEndDate">
        <small>마감일이 지나면 자동으로 마감 처리되고 팝업도 해제됩니다.</small>
      </div>
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="popupYnCheck"> 팝업 등록
        </label>
        <div id="popupDateArea" class="popup-date-area" style="display:none;">
          <div class="form-group" style="margin-bottom:12px;">
            <label>팝업 시작일 *</label>
            <input type="date" id="popupStartDate">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>팝업 종료일</label>
            <input type="date" id="popupEndDate">
          </div>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeModal()">취소</button>
        <button class="btn-primary" onclick="saveNotice()">저장</button>
      </div>
    </div>
  </div>

  <!-- 팝업 교체 확인 모달 -->
  <div class="modal" id="popupReplaceModal">
    <div class="modal-content confirm-modal-content">
      <h2>팝업 변경 확인</h2>
      <p>현재 팝업으로 지정된 공지가 있습니다.</p>
      <p>기존 팝업: <span class="notice-name" id="currentPopupTitle"></span></p>
      <p class="warn-text">※ 기존 팝업이 해제되고 새 공지로 교체됩니다.</p>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeReplaceModal()">취소</button>
        <button class="btn-confirm" onclick="confirmReplace()">교체</button>
      </div>
    </div>
  </div>

  <!-- 팝업 미리보기 모달 -->
  <div class="modal" id="popupPreviewModal">
    <div class="modal-content popup-preview-content">
      <h2>팝업 미리보기</h2>
      <div class="popup-preview-box">
        <div class="popup-header">
          <span class="popup-title" id="popupPreviewTitle"></span>
          <span class="popup-period" id="popupPeriod"></span>
        </div>
        <div class="popup-body">
          <p class="popup-content-text" id="popupPreviewContent"></p>
        </div>
        <div style="padding:12px 20px;display:flex;justify-content:flex-end;border-top:1px solid #f3f4f6;background:#f9fafb;">
          <button class="popup-close-btn" onclick="closePopupPreview()">닫기</button>
        </div>
      </div>
      <div class="modal-buttons" style="margin-top:16px;">
        <button class="btn-cancel" onclick="closePopupPreview()">취소</button>
        <button id="popupActivateBtn" class="btn-primary" onclick="activatePopupFromPreview()">메인 팝업으로 활성화</button>
        <button id="popupDeactivateBtn" class="btn-deactivate" style="display:none;" onclick="deactivatePopupFromPreview()">팝업 해제</button>
      </div>
    </div>
  </div>

</section>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

</body>
</html>
